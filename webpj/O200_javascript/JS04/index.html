<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS04</title>
    <style>
        body{
            font-size: 3rem;
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <script type="text/javascript" language="javascript">
       
       var verd="verd";
       var vermell="vermell";

        var color="verd";
        var color="vermell";

        var color=prompt("Digues el color");


        if (color==verd) {
            document.write("Passa");
            document.body.style.backgroundColor="#008f39";
            document.body.style.color="#FFF";
        }

        else if (color == vermell)
        {
            document.write("stop");
            document.body.style.backgroundColor="#cc0000";
            document.body.style.color="#FFF";
        }

        else {
            document.write("Alterta");
            document.body.style.backgroundColor="ffa500";
            document.body.style.color="#FFF";
        }

    </script>
</body>
</html>
